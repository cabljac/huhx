name: Bug report
description: Something broke or behaves contrary to the docs.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail that another
        contributor can reproduce locally without a back-and-forth.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Concise description of the broken behavior.
      placeholder: --answer values with commas are corrupted before reaching the runner.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: What you thought would happen instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: |
        Smallest snippet that reproduces. Include the form definition,
        runner construction, and the answers/flags/env supplied.
      render: go
      placeholder: |
        form := huhx.NewForm(...)
        r := huhx.New(form, huhx.WithNonInteractive(huhx.Always), huhx.WithAnswers(...))
        err := r.Run()
    validations:
      required: true

  - type: input
    id: huhx-version
    attributes:
      label: huhx version
      description: Output of `go list -m github.com/cabljac/huhx` or the commit SHA.
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Output of `go version`.
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Stack traces, full error messages, related issues.
